name: Set Branch Protection

on:
  workflow_dispatch:

jobs:
  protect:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    env:
      BRANCH: main
      # Provide a PAT with `repo` and `admin:repo_hook` scopes in repo secrets as GH_ADMIN_PAT
      ADMIN_PAT: ${{ secrets.GH_ADMIN_PAT }}

    steps:
      - name: Check inputs
        run: |
          if [ -z "${ADMIN_PAT}" ]; then
            echo "ERROR: Secret GH_ADMIN_PAT is required. Create a personal access token with 'repo' scope and add it to repository secrets.";
            exit 1;
          fi

      - name: Set branch protection via GitHub REST API
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const branch = process.env.BRANCH || 'main';
            const adminPat = process.env.ADMIN_PAT;
            const client = github.getOctokit(adminPat);

            // Required status check contexts must match the workflow checks visible in the PR UI.
            // Adjust the context name below if your workflow uses a different display name.
            const contexts = ['CI & Deploy / Run tests'];

            await client.rest.repos.updateBranchProtection({
              owner,
              repo,
              branch,
              required_status_checks: {
                strict: true,
                contexts,
              },
              enforce_admins: true,
              required_pull_request_reviews: {
                required_approving_review_count: 1,
              },
              restrictions: null,
            });

            console.log(`Branch protection applied to ${owner}/${repo}@${branch}`);
