name: Set Branch Protection

on:
  workflow_dispatch:

jobs:
  protect:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    env:
      BRANCH: main
      # Provide a PAT with `repo` and `admin:repo_hook` scopes in repo secrets as GH_ADMIN_PAT
      ADMIN_PAT: ${{ secrets.GH_ADMIN_PAT }}

    steps:
      - name: Check inputs
        run: |
          if [ -z "${ADMIN_PAT}" ]; then
            echo "ERROR: Secret GH_ADMIN_PAT is required. Create a personal access token with 'repo' scope and add it to repository secrets.";
            exit 1;
          fi

      - name: Set branch protection via GitHub REST API
        env:
          GH_TOKEN: ${{ secrets.GH_ADMIN_PAT }}
        run: |
          owner="${GITHUB_REPOSITORY%%/*}"
          repo="${GITHUB_REPOSITORY##*/}"
          branch="${BRANCH:-main}"

          # Required status check contexts must match the workflow checks visible in the PR UI.
          # Adjust the context name below if your workflow uses a different display name.
          cat <<'EOF' > /tmp/protection.json
{
  "required_status_checks": {
    "strict": true,
    "contexts": ["CI & Deploy / Run tests"]
  },
  "enforce_admins": true,
  "required_pull_request_reviews": {
    "required_approving_review_count": 1
  },
  "restrictions": null
}
EOF

          gh api --method PUT "/repos/${owner}/${repo}/branches/${branch}/protection" --input /tmp/protection.json

          echo "Branch protection applied to ${owner}/${repo}@${branch}";
