name: CI & Deploy

on:
  push:
    branches: [ main ]
    tags:
      - 'v*.*.*'
  pull_request:
    branches: [ main ]
  workflow_dispatch:
  release:
    types: [published]

jobs:
  deploy:
    name: Build and Deploy to Firebase
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'
    env:
      FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
      # GOOGLE_APPLICATION_CREDENTIALS will be set at runtime to the temp file
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'

      - name: Install functions dependencies and build
        working-directory: functions
        run: |
          npm ci
          if [ -f package.json ] && grep -q "build" package.json; then
            npm run build || true
          fi

      - name: Authenticate with service account
        run: |
          echo "${{ secrets.FIREBASE_SERVICE_ACCOUNT }}" > "$RUNNER_TEMP/firebase_sa.json"
          echo "Wrote service account to $RUNNER_TEMP/firebase_sa.json"
        shell: bash

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Deploy Firestore rules, functions, hosting
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ runner.temp }}/firebase_sa.json
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
        run: |
          firebase deploy --only firestore:rules,functions,hosting --project "$FIREBASE_PROJECT_ID"

      - name: Clean up service account file
        run: |
          rm -f "$RUNNER_TEMP/firebase_sa.json" || true
        shell: bash
