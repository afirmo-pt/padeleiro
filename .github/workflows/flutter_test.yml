name: Flutter CI - Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install dependencies
        run: |
          cd padeleiro_app
          flutter pub get

      - name: Run tests
        run: |
          cd padeleiro_app
          flutter test --no-pub --concurrency=1
